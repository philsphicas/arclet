name: ci

on:
  push:
    branches: [main, "dependabot/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -x

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mfinelli/setup-shfmt@v4
      - name: shfmt -d
        run: shfmt -d -i 4 -ci -bn .

  hadolint:
    name: hadolint (${{ matrix.base }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base: [azl3, ubuntu]
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/${{ matrix.base }}/Dockerfile

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2

  editorconfig:
    name: editorconfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: editorconfig-checker/action-editorconfig-checker@v2

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # gitleaks-action does a delta scan based on the push event's
      # `before` SHA, which breaks on force-push (the old SHA is
      # unreachable). Run the gitleaks binary directly over the full
      # working tree instead — cheap on a repo this small.
      - name: Run gitleaks
        uses: docker://zricethezav/gitleaks:v8.30.1
        with:
          args: detect --source=/github/workspace --no-banner --verbose --redact

  build-and-scan:
    name: build + trivy (${{ matrix.base }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base: [azl3, ubuntu]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image (load to local daemon)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.base }}/Dockerfile
          load: true
          tags: arclet:ci-${{ matrix.base }}
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: arclet:ci-${{ matrix.base }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
