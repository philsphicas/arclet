name: release

on:
  push:
    branches: [main]
    # Only build release tags from actual semver tags; v* would match `vfoo`.
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  docker:
    name: build + publish (${{ matrix.base }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep this matrix in sync with .github/workflows/ci.yml so the
        # PR gate fails on anything the release would fail on.
        include:
          # AL3 is the default base — owns the unsuffixed tags
          # (:vX.Y.Z, :latest, :dev). amd64-only: Microsoft does not
          # publish azcmagent for aarch64 in the AL3 repo.
          - base: azl3
            suffix: ""
            platforms: linux/amd64
          # Ubuntu is the secondary base — its tags get the -ubuntu suffix
          # (:vX.Y.Z-ubuntu, :latest-ubuntu, :dev-ubuntu). Multi-arch:
          # Microsoft publishes azcmagent for both amd64 and arm64 in
          # packages.microsoft.com's Ubuntu repo, so this is the variant
          # for arm64 hosts.
          - base: ubuntu
            suffix: "-ubuntu"
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.base }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Attest provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
